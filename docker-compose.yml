version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .db.env
    restart: unless-stopped
  backend:
    build: .
    container_name: backend
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 config.wsgi:application
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
volumes:
  mysql_data:
  static_volume:
